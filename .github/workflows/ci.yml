name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: '0 12 * * *' # Every day noon UTC

jobs:
  build:
    timeout-minutes: 60
    strategy:
      # Don't cancel everything when one Go version fails
      fail-fast: false
      matrix:
        go:
          - version: "^1.26" # Golang upstream stable
            label: "1.26"
          - version: ">=1.27.0-rc.1" # Golang upstream release candidate and newer
            label: "1.27rc"
        GOMAXPROCS:
          - "0" # Use all cpus (default).
          - "1" # Single-cpu mode. Some failures are only visible like this.

    name: Run CI with Go Version ${{ matrix.go.label }} & GOMAXPROCS ${{ matrix.GOMAXPROCS }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # Make "git describe" work

      - name: Install Go ${{ matrix.go.label }}
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go.version }}

      # CI platform specific setup steps happen here
      - run: sudo apt-get update -qq && sudo apt-get install -qq fuse3 libssl-dev libfuse-dev fio
      - run: echo user_allow_other | sudo tee -a /etc/fuse.conf

      # Actual test steps are in all.bash
      - name: Run tests + capture profiles
        env:
          GOMAXPROCS: ${{ matrix.GOMAXPROCS }}
          GO_PROFILE_TAG: ${{ matrix.go.label }}
        run: ./all.bash

      - name: Upload benchmark profiles
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bench-profiles-go${{ matrix.go.label }}-gomaxprocs${{ matrix.GOMAXPROCS }}
          path: benchmark/profiles/
          if-no-files-found: warn
          retention-days: 14
